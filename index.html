<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kani's Magic Dust ✨</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #050714; cursor: pointer; user-select: none; touch-action: none; }
        canvas { display: block; }
        #instruction { 
            position: absolute; bottom: 10%; width: 100%; text-align: center; 
            color: #ffffff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            font-size: clamp(14px, 4vw, 18px); letter-spacing: 2px; pointer-events: none; 
            transition: opacity 0.5s; animation: pulse 2s infinite; text-shadow: 0 0 10px rgba(255,255,255,0.8);
        }
        @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
    </style>
</head>
<body>
    <div id="instruction">Tap / Click screen!</div>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const instruction = document.getElementById('instruction');
        
        let width, height;
        let particles = [];
        const numParticles = 2200; 
        let isTransitioning = false;
        
        // audio setup
        const bgm = new Audio('darling.mp3'); 
        bgm.loop = true; 
        bgm.preload = 'auto';
        let isMusicPlaying = false;
        
        const sequence = [
            { text: 'Happy\nWhite Day', color: '#ff80b3' }, 
            { text: 'かにちゃん', color: '#ffd700' },        
            { text: '🦀', color: '#ff9900' }              
        ];
        let currentIndex = -1;

        // coloring helper
        function hexToRgb(hex) {
            let result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? { r: parseInt(result[1], 16), g: parseInt(result[2], 16), b: parseInt(result[3], 16) } : {r: 255, g: 255, b: 255};
        }

        let currentGlow = {r: 255, g: 255, b: 255};
        let targetGlow = {r: 255, g: 255, b: 255};

        class Particle {
            constructor() {
                this.x = Math.random() * window.innerWidth;
                this.y = Math.random() * window.innerHeight;
                this.destX = this.x;
                this.destY = this.y;
                this.r = Math.random() * 1.5 + 0.5; 
                this.friction = Math.random() * 0.05 + 0.88; 
                this.vx = 0;
                this.vy = 0;
                
                this.isText = false; 
                this.angle = Math.random() * Math.PI * 2; 
                this.speed = Math.random() * 0.5 + 0.2; 

                // color trans
                this.color = {r: 255, g: 255, b: 255}; 
                this.targetColor = {r: 255, g: 255, b: 255};
            }
            
            setTargetColor(hex) {
                this.targetColor = hexToRgb(hex);
            }

            update() {
                if (this.isText) {
                    let dx = this.destX - this.x;
                    let dy = this.destY - this.y;
                    this.vx += dx * 0.015;
                    this.vy += dy * 0.015;
                    this.vx *= this.friction;
                    this.vy *= this.friction;
                    this.x += this.vx;
                    this.y += this.vy;
                } else {
                    this.x += Math.cos(this.angle) * this.speed;
                    this.y += Math.sin(this.angle) * this.speed;
                    this.angle += (Math.random() - 0.5) * 0.05;

                    if (this.x < 0) this.x = width;
                    if (this.x > width) this.x = 0;
                    if (this.y < 0) this.y = height;
                    if (this.y > height) this.y = 0;
                }

                // color lerping
                this.color.r += (this.targetColor.r - this.color.r) * 0.05;
                this.color.g += (this.targetColor.g - this.color.g) * 0.05;
                this.color.b += (this.targetColor.b - this.color.b) * 0.05;
            }
            
            draw() {
                ctx.fillStyle = `rgb(${this.color.r | 0}, ${this.color.g | 0}, ${this.color.b | 0})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        for(let i=0; i<numParticles; i++) {
            particles.push(new Particle());
        }

        function getTargetPositions(textItem) {
            const offCanvas = document.createElement('canvas');
            const offCtx = offCanvas.getContext('2d', { willReadFrequently: true });
            offCanvas.width = width;
            offCanvas.height = height;

            offCtx.fillStyle = 'white';
            offCtx.textAlign = 'center';
            offCtx.textBaseline = 'middle';
            
            let isMobile = width < 600;
            let fontSize = isMobile ? width / 4.5 : width / 10; 
            if (fontSize > 100) fontSize = 100;
            if (textItem.text === '🦀') fontSize = isMobile ? width / 2.5 : width / 5;

            offCtx.font = `bold ${fontSize}px sans-serif`;
            
            let lines = textItem.text.split('\n');
            let lineHeight = fontSize * 1.2;
            let startY = (height / 2) - ((lines.length - 1) * lineHeight / 2);

            lines.forEach((line, index) => {
                offCtx.fillText(line, width / 2, startY + (index * lineHeight));
            });

            const imgData = offCtx.getImageData(0, 0, width, height).data;
            let gap = isMobile ? 4 : 5; 
            if (textItem.text === '🦀') gap = isMobile ? 5 : 7;
            
            let targets = [];
            for (let y = 0; y < height; y += gap) {
                for (let x = 0; x < width; x += gap) {
                    const alpha = imgData[(y * width + x) * 4 + 3];
                    if (alpha > 128) {
                        targets.push({ x: x + (Math.random() - 0.5) * 4, y: y + (Math.random() - 0.5) * 4 });
                    }
                }
            }

            if (targets.length > numParticles - 300) {
                targets.sort(() => Math.random() - 0.5);
                targets = targets.slice(0, numParticles - 300);
            }
            return targets;
        }

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            
            if(currentIndex >= 0 && !isTransitioning) {
               const seq = sequence[currentIndex];
               const targets = getTargetPositions(seq);
               targets.sort(() => Math.random() - 0.5);
               particles.forEach((p, i) => {
                   if (i < targets.length) {
                       p.destX = targets[i].x;
                       p.destY = targets[i].y;
                       p.isText = true;
                   } else {
                       p.isText = false; 
                   }
               });
            }
        }
        window.addEventListener('resize', resize);
        resize();

        function triggerNextAnimation() {
            if (isTransitioning) return;
            
            instruction.style.opacity = '0';
            currentIndex++;
            
            if (currentIndex >= sequence.length) {
                currentIndex = -1;
                isTransitioning = true;
                
                targetGlow = hexToRgb('#ffffff'); 

                particles.forEach(p => {
                    p.isText = true; 
                    p.destX = Math.random() * width;
                    p.destY = Math.random() * height;
                    p.setTargetColor('#ffffff'); 
                });
                setTimeout(() => {
                    particles.forEach(p => p.isText = false);
                    isTransitioning = false; 
                }, 200);

            } else {
                isTransitioning = true;
                const seq = sequence[currentIndex];
                
                targetGlow = hexToRgb(seq.color);

                particles.forEach(p => {
                    p.isText = true; 
                    p.destX = Math.random() * width;
                    p.destY = Math.random() * height;
                    p.setTargetColor(seq.color); 
                });

                setTimeout(() => {
                    const targets = getTargetPositions(seq);
                    targets.sort(() => Math.random() - 0.5);

                    particles.forEach((p, i) => {
                        if (i < targets.length) {
                            p.destX = targets[i].x;
                            p.destY = targets[i].y;
                            p.isText = true; 
                        } else {
                            p.isText = false; 
                        }
                    });
                    
                    isTransitioning = false; 
                }, 800);
            }
        }

        function animate() {
            ctx.fillStyle = 'rgba(5, 7, 20, 0.3)'; 
            ctx.fillRect(0, 0, width, height);
            
            currentGlow.r += (targetGlow.r - currentGlow.r) * 0.05;
            currentGlow.g += (targetGlow.g - currentGlow.g) * 0.05;
            currentGlow.b += (targetGlow.b - currentGlow.b) * 0.05;

            ctx.shadowBlur = window.innerWidth < 600 ? 5 : 10; 
            ctx.shadowColor = `rgb(${currentGlow.r | 0}, ${currentGlow.g | 0}, ${currentGlow.b | 0})`;

            particles.forEach(p => {
                p.update();
                p.draw();
            });
            
            ctx.shadowBlur = 0;
            requestAnimationFrame(animate);
        }

        let lastInteraction = 0;

        function handleUserInteraction() {
            // 1. Eksekusi lagu
            if (!isMusicPlaying) {
                let playPromise = bgm.play();
                if (playPromise !== undefined) {
                    playPromise.then(() => {
                        isMusicPlaying = true;
                    }).catch(err => {
                        console.log("Menunggu izin browser...", err);
                    });
                }
            }
            
            // 2. Majukan animasi
            triggerNextAnimation();
        }

        // CUKUP PAKAI SATU INI SAJA. Paling aman, paling ampuh!
        window.addEventListener('click', handleUserInteraction);

        animate();
    </script>
    <!-- cr: © 2026 Hanashiro Yuriku -->
</body>
</html>
